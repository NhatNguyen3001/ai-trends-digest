services:
  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HOST=0.0.0.0
    volumes:
      - ./digests:/app/digests
      - ./data:/app/data
    depends_on:
      - qdrant

volumes:
  qdrant_data:
